version: "3"

services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v23.1
    container_name: tictactoe-cockroachdb
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: always
    volumes:
      - cockroach-data:/var/lib/cockroach
    expose:
      - "8080"
      - "26257"
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: tictactoe-nakama
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - "/nakama/nakama migrate up --database.address root@cockroachdb:26257/nakama && exec /nakama/nakama --name nakama --database.address root@cockroachdb:26257/nakama --logger.level DEBUG --session.token_expiry_sec 7200 --runtime.path /nakama/data/modules --runtime.js_entrypoint tictactoe.js --socket.outgoing_queue_size 64"
    restart: always
    links:
      - cockroachdb
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./modules:/nakama/data/modules
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cockroach-data: