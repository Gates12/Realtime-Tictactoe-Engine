version: "3"

# Production deployment — DigitalOcean Droplet
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v23.1
    container_name: ttt-cockroachdb
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: unless-stopped
    volumes:
      - cockroach-data:/var/lib/cockroach
    expose:
      - "26257"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nakama:
    image: heroiclabs/nakama:3.22.0
    container_name: ttt-nakama
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address root@cockroachdb:26257/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address root@cockroachdb:26257/nakama
        --logger.level WARN
        --session.token_expiry_sec 7200
        --runtime.path /nakama/data/modules
        --socket.outgoing_queue_size 64
        --socket.max_message_size_bytes 4096
    restart: unless-stopped
    links:
      - cockroachdb
    depends_on:
      cockroachdb:
        condition: service_healthy
    volumes:
      - ./modules:/nakama/data/modules:ro
    ports:
      - "7349:7349"   # Real-time socket (client)
      - "7350:7350"   # API (client)
      - "7351:7351"   # Console (restrict via firewall)
    environment:
      - NAKAMA_SERVER_KEY=${NAKAMA_SERVER_KEY:-defaultkey}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  cockroach-data:
    driver: local
